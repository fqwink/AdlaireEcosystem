name: adlaire-ecosystem

services:
  adlaire-xserver:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.xserver
    image: adlaire-ecosystem:xserver
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      ADLAIRE_LOG_LEVEL: INFO
      ADLAIRE_DATABASE_URL: file:/var/www/html/storage/adlaire.sqlite
      ADLAIRE_DATABASE_TOKEN: ""
      ADLAIRE_TRUSTED_PROXIES: ""
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html:ro
      - adlaire_xserver_tmp:/var/www/html/storage
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  adlaire_xserver_tmp:
